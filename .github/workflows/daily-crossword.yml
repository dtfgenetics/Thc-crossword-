name: Daily Crossword

on:
  schedule:
    - cron: '15 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate or promote daily puzzle
        run: npm run crossword:publish-today
      - name: Validate puzzles
        run: npm run crossword:validate
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit puzzle files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/puzzles package-lock.json package.json
          git diff --cached --quiet || git commit -m "Generate daily crossword"
          git push
