name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run crossword:audit
      - run: npm test
      - run: npm run crossword:publish-next -- --theme plant-science --dry-run
      - run: npm run crossword:generate -- --week 2026-W26 --theme grow-room-basics --attempts 50
      - run: npm run crossword:validate
      - run: npm run crossword:validate-ipuz
      - run: npm run crossword:validate-exolve
      - run: npm run crossword:check-exports
      - run: npm run verify
      - run: npm run build
